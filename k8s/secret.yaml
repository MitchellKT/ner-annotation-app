# Session signing key. Cookies are HMAC-signed with this; keep it stable and
# secret so sessions survive restarts and can't be forged.
#
# Do NOT commit a real value. Generate and apply out-of-band, e.g.:
#   kubectl create secret generic ner-annotator-secrets \
#     --from-literal=SESSION_SECRET="$(openssl rand -base64 48)"
#
# This manifest is a template/placeholder so `kubectl apply -k` has something
# to reference; replace the value or create the secret imperatively as above.
apiVersion: v1
kind: Secret
metadata:
  name: ner-annotator-secrets
  labels:
    app: ner-annotator
type: Opaque
stringData:
  SESSION_SECRET: "CHANGE-ME-generate-with-openssl-rand-base64-48"
